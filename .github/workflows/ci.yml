# CI gate. Everything runs in the required "test" job -- a red lint, a complexity breach
# (measured by our sibling module PSComplexity), a unit-test failure, or a self-mutation
# regression all block the merge. Dependencies are pinned for reproducibility.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Pester + PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.8.0 -Force -Scope CurrentUser
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser

      - name: Module manifest is valid + imports
        shell: pwsh
        run: |
          Test-ModuleManifest ./PSMutant.psd1 | Out-Null
          Import-Module ./PSMutant.psd1 -Force
          Get-Command Invoke-PSMutation -ErrorAction Stop | Out-Null

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $paths = './src', './tests', './PSMutant.psm1', './PSMutant.psd1'
          $findings = $paths | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Error, Warning
          }
          if ($findings) {
            $findings | Format-Table RuleName, ScriptName, Line, Message -AutoSize
            throw "$($findings.Count) PSScriptAnalyzer finding(s) -- lint gate failed"
          }
          Write-Host 'Lint clean.'

      - name: Unit tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.PassThru = $true
          $cfg.Output.Verbosity = 'Detailed'
          $r = Invoke-Pester -Configuration $cfg
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) test(s) failed" }

      # Complexity gate via our sibling module PSComplexity (faithful cognitive metric).
      - name: Complexity gate (PSComplexity)
        shell: pwsh
        run: |
          Install-Module PSComplexity -RequiredVersion 0.1.0 -Force -Scope CurrentUser
          Import-Module PSComplexity -Force
          if (-not (Test-PSComplexity -Path ./src -Recurse -MaxCyclomatic 15 -MaxCognitive 15)) {
            throw 'Complexity gate failed -- a unit exceeds 15 cyclomatic or cognitive.'
          }

      - name: Mutation test PSMutant against itself (gated)
        shell: pwsh
        run: |
          Import-Module ./PSMutant.psd1 -Force
          $result = Invoke-PSMutation -ConfigFile ./psmutant.self.config.json -SourceRoot . -Quiet
          Write-Host "Self mutation score: $($result.Score)% ($($result.Killed)/$($result.Total))"
          if ($result.ExitCode -ne 0) { throw "Mutation score $($result.Score)% is below the break threshold" }
