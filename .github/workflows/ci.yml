# CI gate. Everything here runs in the single "test" job, which is the required
# status check on main -- so a red unit test, lint finding, complexity breach, or
# self-mutation regression all block the merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester + PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Module manifest is valid + imports
        shell: pwsh
        run: |
          Test-ModuleManifest ./PSMutant.psd1 | Out-Null
          Import-Module ./PSMutant.psd1 -Force
          Get-Command Invoke-PSMutation -ErrorAction Stop | Out-Null

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          # Scope to our PowerShell trees + the manifest/module (avoids -Recurse over
          # the repo root, which trips a PSSA NullReference on non-PS files).
          $paths = './src', './tests', './tools', './PSMutant.psm1', './PSMutant.psd1'
          $findings = $paths | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Error, Warning
          }
          if ($findings) {
            $findings | Format-Table RuleName, ScriptName, Line, Message -AutoSize
            throw "$($findings.Count) PSScriptAnalyzer finding(s) -- lint gate failed"
          }
          Write-Host 'Lint clean.'

      - name: Unit tests + complexity gate
        shell: pwsh
        run: |
          # ./tests includes the cyclomatic + cognitive complexity gate (Complexity.Tests.ps1).
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.PassThru = $true
          $cfg.Output.Verbosity = 'Detailed'
          $r = Invoke-Pester -Configuration $cfg
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) test(s) failed" }

      - name: Mutation test PSMutant against itself (gated)
        shell: pwsh
        run: |
          Import-Module ./PSMutant.psd1 -Force
          $result = Invoke-PSMutation -ConfigFile ./psmutant.self.config.json -SourceRoot . -Quiet
          Write-Host "Self mutation score: $($result.Score)% ($($result.Killed)/$($result.Total))"
          # ExitCode is non-zero when the score drops below the config's thresholds.break.
          if ($result.ExitCode -ne 0) { throw "Mutation score $($result.Score)% is below the break threshold" }
